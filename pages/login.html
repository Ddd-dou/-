<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 注册 - 甜言猕语</title>
  <link rel="icon" type="image/svg+xml" href="../assets/icons/kiwi.svg">
  <link rel="stylesheet" href="../styles/theme.css">
</head>
<body class="page">
  <div class="back-bar">
    <a class="back-btn" href="../index.html"><i class="back-btn__icon"></i> 返回</a>
  </div>
  <main class="container auth-layout">
    <div class="card auth-card">
      <h2>登录 / 注册</h2>
      <div class="actions" style="margin-bottom:12px;">
        <button class="btn btn--primary" id="tab-login">登录</button>
        <button class="btn btn--outline" id="tab-register">注册</button>
      </div>
      <form id="form-login" class="form">
        <input class="input" type="tel" placeholder="手机号" required id="login-phone">
        <input class="input" type="password" placeholder="密码" required id="login-pass">
        <button class="btn btn--primary" type="submit">登录</button>
      </form>
      <form id="form-register" class="form" style="display:none;">
        <input class="input" type="tel" placeholder="手机号" required id="reg-phone">
        <input class="input" type="text" placeholder="用户名" required id="reg-name">
        <input class="input" type="password" placeholder="密码" required id="reg-pass">
        <button class="btn btn--primary" type="submit">注册</button>
      </form>
    </div>
  </main>

  <script src="../scripts/main.js"></script>
  <script src="../scripts/login.js"></script>
</body>
</html>
